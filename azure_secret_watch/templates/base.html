<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="{{ url_for('static', filename='dog.png') }}">
<title>{% block title %}azure-secret-watch{% endblock %}</title>
<style>
  :root {
    color-scheme: light;
    --bg-page: #fafafa;
    --bg-surface: #ffffff;
    --bg-surface-alt: #f4f4f5;
    --text-primary: #1b1b1f;
    --text-secondary: #565660;
    --text-muted: #9a9aa3;
    --border: #ececef;
    --border-strong: #d9d9de;
    --accent: #2563eb;
    --accent-bg: #eff4ff;
    --accent-text: #1d4ed8;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --danger-text: #b91c1c;
    --warning: #d97706;
    --warning-bg: #fffbeb;
    --warning-text: #a16207;
    --success: #16a34a;
    --success-bg: #f0fdf4;
    --success-text: #15803d;
    --radius: 10px;
    --shadow-xs: 0 1px 2px rgba(16,17,20,0.04);
    --shadow-sm: 0 1px 3px rgba(16,17,20,0.05);
    --shadow-md: 0 8px 24px rgba(16,17,20,0.07);
    --nav-bg: rgba(255,255,255,0.86);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .icon { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; vertical-align: -3px; }

  /* ── Top navigation ─────────────────────────────────────────────── */
  .topnav {
    position: sticky; top: 0; z-index: 20;
    background: var(--nav-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .topnav-inner {
    max-width: 1120px; margin: 0 auto; padding: 0 24px;
    height: 56px; display: flex; align-items: stretch; gap: 30px;
  }
  .brand { display: flex; align-items: center; gap: 9px; text-decoration: none; color: var(--text-primary); }
  .brand-mark {
    width: 30px; height: 30px; flex-shrink: 0; border-radius: 8px;
    background: #f2f1ee; display: flex; align-items: center; justify-content: center;
  }
  .brand-mark img { width: 82%; height: 82%; object-fit: contain; }
  .brand-name { font-size: 13.5px; font-weight: 650; letter-spacing: -0.01em; }
  .tabs { display: flex; align-items: stretch; gap: 22px; }
  .tab {
    display: inline-flex; align-items: center; text-decoration: none;
    font-size: 13.5px; font-weight: 500; color: var(--text-secondary);
    border-bottom: 2px solid transparent; margin-bottom: -1px; padding-top: 2px;
    transition: color .12s ease;
  }
  .tab:hover { color: var(--text-primary); }
  .tab.active { color: var(--text-primary); font-weight: 600; border-bottom-color: var(--accent); }
  .topnav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .icon-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 8px; border: none;
    background: transparent; color: var(--text-muted); cursor: pointer;
    transition: background .12s ease, color .12s ease;
  }
  .icon-btn:hover { background: var(--bg-surface-alt); color: var(--text-primary); }

  /* ── Layout ─────────────────────────────────────────────────────── */
  .wrap { max-width: 1120px; margin: 0 auto; padding: 40px 24px 88px; }

  .page-head { margin-bottom: 6px; }
  .page-head h1 { font-size: 22px; font-weight: 650; margin: 0; letter-spacing: -0.015em; }
  .page-head p { margin: 5px 0 0; color: var(--text-secondary); font-size: 13.5px; }

  .meta { color: var(--text-muted); font-size: 12.5px; margin: 10px 0 24px; display: flex; flex-wrap: wrap; gap: 6px 8px; align-items: center; }
  .meta .sep { color: var(--border-strong); }

  .error-banner {
    display: flex; gap: 8px; align-items: flex-start;
    background: var(--danger-bg); color: var(--danger-text);
    border-radius: var(--radius); padding: 11px 14px; margin-bottom: 18px; font-size: 13px;
  }
  .success-banner {
    display: flex; gap: 8px; align-items: flex-start;
    background: var(--success-bg); color: var(--success-text);
    border-radius: var(--radius); padding: 11px 14px; margin-bottom: 18px; font-size: 13px;
  }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11.5px; font-weight: 500; padding: 4px 10px; border-radius: 999px;
    background: var(--bg-surface-alt); color: var(--text-secondary); border: none;
  }
  .chip.on { background: var(--success-bg); color: var(--success-text); font-weight: 600; }
  .chip.off { color: var(--text-muted); }
  .chip.warn { background: var(--warning-bg); color: var(--warning-text); font-weight: 600; }
  .chip .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .card-surface {
    background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: var(--shadow-xs);
  }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 13px; border-radius: 8px; border: 1px solid var(--border-strong);
    background: var(--bg-surface); color: var(--text-primary); font-weight: 550; cursor: pointer; font-size: 13px;
    transition: background .12s ease, border-color .12s ease;
  }
  .btn:hover { background: var(--bg-surface-alt); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.07); background: var(--accent); }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .btn .icon.spin { animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  input[type="search"], input[type="text"], input[type="email"], input[type="number"] {
    padding: 7px 11px; border-radius: 8px; border: 1px solid var(--border-strong);
    background: var(--bg-surface); color: var(--text-primary); font-size: 13px;
  }
  select {
    padding: 7px 30px 7px 11px; border-radius: 8px; border: 1px solid var(--border-strong);
    background: var(--bg-surface); color: var(--text-primary); font-size: 13px;
    appearance: none; -webkit-appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--text-muted) 50%), linear-gradient(135deg, var(--text-muted) 50%, transparent 50%);
    background-position: calc(100% - 16px) 55%, calc(100% - 11px) 55%;
    background-size: 5px 5px, 5px 5px; background-repeat: no-repeat;
  }
  input::placeholder { color: var(--text-muted); }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .toggle { position: relative; display: inline-block; width: 38px; height: 22px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .track {
    position: absolute; inset: 0; background: var(--border-strong); border-radius: 999px; cursor: pointer;
    transition: background .15s ease;
  }
  .toggle .track::before {
    content: ""; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: transform .15s ease;
    box-shadow: 0 1px 2px rgba(0,0,0,0.25);
  }
  .toggle input:checked + .track { background: var(--accent); }
  .toggle input:checked + .track::before { transform: translateX(16px); }
  .toggle input:disabled + .track { opacity: 0.45; cursor: default; }

  footer { margin-top: 36px; font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }

  {% block extra_style %}{% endblock %}
</style>
</head>
<body>
<svg style="display:none">
  <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></symbol>
  <symbol id="i-refresh" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 3 21 9 15 9"/></symbol>
  <symbol id="i-download" viewBox="0 0 24 24"><path d="M12 3v12"/><polyline points="7 11 12 16 17 11"/><path d="M5 19h14"/></symbol>
  <symbol id="i-external" viewBox="0 0 24 24"><path d="M14 4h6v6"/><path d="M20 4 10 14"/><path d="M18 13v5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h5"/></symbol>
  <symbol id="i-clip" viewBox="0 0 24 24"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M9 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3"/></symbol>
  <symbol id="i-bolt" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></symbol>
  <symbol id="i-alert" viewBox="0 0 24 24"><path d="M12 2 1 21h22z"/><line x1="12" y1="9" x2="12" y2="13"/></symbol>
  <symbol id="i-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></symbol>
  <symbol id="i-grid" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></symbol>
  <symbol id="i-bell" viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></symbol>
  <symbol id="i-mail" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/></symbol>
  <symbol id="i-code" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></symbol>
  <symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 2 4 5v6c0 5.2 3.4 9.4 8 11 4.6-1.6 8-5.8 8-11V5z"/><path d="m9 12 2 2 4-4"/></symbol>
  <symbol id="i-help" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12" y2="17.01"/></symbol>
  <symbol id="i-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></symbol>
  <symbol id="i-lock" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></symbol>
  <symbol id="i-database" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></symbol>
</svg>

<header class="topnav">
  <div class="topnav-inner">
    <a class="brand" href="/">
      <span class="brand-mark"><img src="{{ url_for('static', filename='dog.png') }}" alt=""></span>
      <span class="brand-name">azure-secret-watch</span>
    </a>
    <nav class="tabs">
      <a href="/" class="tab {{ 'active' if active_page == 'applications' and not view_all else '' }}">Applications</a>
      <a href="/?view=all" class="tab {{ 'active' if view_all else '' }}">All credentials</a>
      <a href="/settings" class="tab {{ 'active' if active_page == 'monitoring' else '' }}">Monitoring</a>
    </nav>
    <div class="topnav-right">
      <a class="icon-btn" href="/help" aria-label="Help">
        <svg class="icon"><use href="#i-help"/></svg>
      </a>
    </div>
  </div>
</header>

<main class="wrap">
  {% block content %}{% endblock %}
</main>

<script>
{% block scripts %}{% endblock %}
</script>
</body>
</html>
